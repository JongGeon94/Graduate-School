<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>작품제작 프로젝트 AI 활용 사전 설문조사</title>
<style>
  :root {
    --navy: #1f3a63;
    --navy-deep: #16294a;
    --accent: #2f5496;
    --bg: #f6f7fb;
    --card: #ffffff;
    --line: #e3e6ee;
    --text: #23262f;
    --sub: #6b7280;
    --ok: #1f8a53;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: var(--text);
    padding: 24px 12px 80px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: #fff;
    border-radius: 18px;
    padding: 32px 28px;
    margin-bottom: 20px;
  }
  .hero .tag {
    display: inline-block;
    font-size: 12px;
    letter-spacing: .08em;
    background: rgba(255,255,255,.15);
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .hero h1 { font-size: 22px; margin: 0 0 6px; line-height: 1.4; }
  .hero p { font-size: 14px; color: rgba(255,255,255,.85); margin: 4px 0; line-height: 1.6; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 20px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    border-bottom: 2px solid var(--navy);
    padding-bottom: 8px;
    margin: 0 0 6px;
  }
  .section-note { font-size: 13px; color: var(--sub); margin: 0 0 16px; font-style: italic; }
  label.field-label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; font-weight: 600; }
  input[type="text"], textarea {
    width: 100%;
    border: 2px solid #f5b942;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #fffaf0;
    transition: border-color .15s, background .15s;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: #e08e00;
    background: #fff4de;
  }
  input[type="text"]::placeholder, textarea::placeholder {
    color: #b8935a;
  }
  textarea { resize: vertical; min-height: 70px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .radio-row { display: flex; gap: 16px; padding: 8px 0; }
  .radio-row label { font-size: 14px; display: flex; align-items: center; gap: 6px; cursor: pointer; }

  .likert-item { padding: 14px 0; border-bottom: 1px solid var(--line); }
  .likert-item:last-child { border-bottom: none; }
  .likert-q { font-size: 14px; margin-bottom: 10px; line-height: 1.5; }
  .likert-q .idx { color: var(--accent); font-weight: 700; margin-right: 4px; }
  .likert-scale { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .likert-opt {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 10.5px; color: var(--sub); text-align: center; cursor: pointer;
    padding: 6px 2px; border-radius: 8px; transition: background .15s;
  }
  .likert-opt:hover { background: #eef1f8; }
  .likert-opt input { accent-color: var(--navy); width: 18px; height: 18px; }
  .likert-opt.checked,
  .likert-opt:has(input:checked) { background: #e7ecf6; color: var(--navy); font-weight: 700; }

  .checkbox-line { display: flex; align-items: center; gap: 8px; font-size: 14px; margin: 8px 0; }

  .submit-bar {
    position: sticky; bottom: 12px;
    display: flex; justify-content: center; margin-top: 10px;
  }
  button.submit {
    background: var(--navy); color: #fff; border: none;
    padding: 14px 40px; border-radius: 999px; font-size: 15px; font-weight: 700;
    cursor: pointer; box-shadow: 0 8px 24px rgba(31,58,99,.35);
  }
  button.submit:hover { background: var(--navy-deep); }
  button.submit:disabled { opacity: .5; cursor: not-allowed; }

  .thanks {
    text-align: center; padding: 60px 20px;
  }
  .thanks .check {
    width: 64px; height: 64px; border-radius: 50%; background: var(--ok);
    color: #fff; font-size: 32px; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
  }
  .thanks h2 { color: var(--navy); }
  .thanks p { color: var(--sub); font-size: 14px; }

  .req { color: #c0392b; }
  .footer-link {
    text-align: center; margin-top: 24px; font-size: 12px; color: var(--sub);
  }
  .footer-link button {
    background: none; border: none; color: var(--sub); text-decoration: underline;
    cursor: pointer; font-size: 12px; padding: 0;
  }

  .teacher-view { max-width: 900px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-box { background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px; text-align:center; }
  .stat-box .num { font-size: 22px; font-weight: 800; color: var(--navy); }
  .stat-box .lbl { font-size: 12px; color: var(--sub); margin-top: 2px; }
  table.result-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 10px; }
  table.result-table th, table.result-table td {
    border: 1px solid var(--line); padding: 6px 8px; text-align: center;
  }
  table.result-table th { background: #eef1f8; color: var(--navy); }
  .csv-btn {
    background: var(--accent); color:#fff; border:none; padding:10px 18px;
    border-radius:8px; font-size:13px; cursor:pointer; margin-bottom: 12px;
  }
  .back-btn {
    background: none; border: 1px solid var(--line); padding: 8px 14px;
    border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 16px;
  }
  .empty-msg { color: var(--sub); font-size: 14px; text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ⚠️ 아래 URL을 Apps Script 배포 후 받은 "웹 앱 URL"로 교체하세요.
const GAS_URL = "https://script.google.com/macros/s/AKfycbwP-u91RhsNSlBNgB85l3BbRwxo_nt9nmnisU6RgETkYJKpcu7iN2bH3VTzQdYlCZLtuw/exec";

// ---------- 문항 정의 ----------
const experienceItems = [
  "나는 평소(학교 밖에서도) 생성형 AI를 자주 사용해 본 경험이 있다.",
  "나는 생성형 AI를 학교 과제나 학습에 활용해 본 경험이 있다.",
  "나는 생성형 AI에게 효과적으로 질문(프롬프트)을 작성하는 방법을 알고 있다.",
  "나는 생성형 AI가 제공하는 답변이 항상 정확하지는 않다는 것을 알고 있다.",
  "나는 코딩이나 회로 설계 문제를 해결할 때 AI를 활용해 본 경험이 있다.",
];
const efficacyItems = [
  "나는 작품제작 중 예상치 못한 문제가 생겨도 침착하게 해결 방법을 찾을 수 있다.",
  "나는 회로나 코드에 오류가 발생했을 때 원인을 스스로 분석할 수 있다.",
  "나는 필요한 정보를 여러 경로(책, 인터넷, AI 등)에서 찾아 문제를 해결할 수 있다.",
  "나는 어려운 과제도 포기하지 않고 끝까지 해결하려는 편이다.",
  "나는 새로운 도구나 기술을 배워서 프로젝트에 적용하는 데 자신이 있다.",
  "나는 문제 해결 방법이 바로 떠오르지 않아도 여러 방법을 시도해 볼 수 있다.",
  "나는 계획한 대로 되지 않을 때, 계획을 수정해서 다시 시도할 수 있다.",
  "나는 다른 사람의 도움 없이도 스스로 결과물을 완성할 수 있다는 자신이 있다.",
];
const attitudeItems = [
  "AI를 활용하면 작품제작 과정에서 도움이 될 것이라고 생각한다.",
  "AI가 제시하는 답을 그대로 사용하는 것은 바람직하지 않다고 생각한다.",
  "AI를 사용하는 것도 하나의 실력(능력)이라고 생각한다.",
  "AI를 지나치게 사용하면 스스로 생각하는 힘이 줄어들 수 있다고 생각한다.",
  "AI 활용 결과물을 그대로 제출하는 것은 표절/부정행위에 해당할 수 있다고 생각한다.",
  "AI가 제공하는 정보나 코드는 반드시 검증한 후 사용해야 한다고 생각한다.",
  "AI를 활용하는 것은 앞으로 사회에 나가서도 필요한 능력이라고 생각한다.",
];
const scaleLabels = ["전혀\n그렇지 않다", "그렇지\n않다", "보통이다", "그렇다", "매우\n그렇다"];

// ---------- 상태 ----------
let state = {
  view: "form", // form | thanks
  dept: "", grade: "", gender: "", code: "",
  exp: Array(experienceItems.length).fill(null),
  eff: Array(efficacyItems.length).fill(null),
  att: Array(attitudeItems.length).fill(null),
  q1: "", q2: "",
  submitting: false,
  errorMsg: "",
};

function likertBlock(title, note, items, arrKey) {
  const rows = items.map((q, i) => {
    const opts = scaleLabels.map((lab, v) => {
      const checked = state[arrKey][i] === v + 1;
      return `
        <label class="likert-opt">
          <input type="radio" name="${arrKey}_${i}" value="${v+1}" ${checked ? "checked" : ""} onchange="setLikert('${arrKey}', ${i}, ${v+1})" />
          <span>${lab.replace("\n","<br/>")}</span>
        </label>`;
    }).join("");
    return `
      <div class="likert-item">
        <div class="likert-q"><span class="idx">${i+1}.</span>${q}</div>
        <div class="likert-scale">${opts}</div>
      </div>`;
  }).join("");
  return `
    <div class="card">
      <div class="section-title">${title}</div>
      <div class="section-note">${note}</div>
      ${rows}
    </div>`;
}

window.setLikert = (arrKey, idx, val) => {
  state[arrKey][idx] = val;
};

function allAnswered() {
  return state.exp.every(v => v !== null) &&
         state.eff.every(v => v !== null) &&
         state.att.every(v => v !== null) &&
         /^[0-9]{6}$/.test(state.code.trim());
}

window.updateField = (key, value) => { state[key] = value; };

window.submitSurvey = async () => {
  if (!allAnswered()) {
    state.errorMsg = "생년월일 6자리(숫자만)와 모든 리커트 문항(1~5점)에 응답해야 제출할 수 있어요.";
    render();
    return;
  }
  if (!GAS_URL || GAS_URL.indexOf("여기에_") === 0) {
    state.errorMsg = "설문 저장 주소(GAS_URL)가 아직 설정되지 않았어요. 관리자에게 문의해주세요.";
    render();
    return;
  }
  state.errorMsg = "";
  state.submitting = true;
  render();
  const payload = {
    dept: state.dept, grade: state.grade, gender: state.gender, code: state.code,
    exp: state.exp, eff: state.eff, att: state.att,
    q1: state.q1, q2: state.q2,
  };
  try {
    // Apps Script는 CORS preflight를 지원하지 않으므로 no-cors + text/plain으로 전송합니다.
    // (응답 내용은 읽을 수 없지만, 네트워크 오류가 없으면 정상 저장된 것으로 처리합니다.)
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    });
    state.view = "thanks";
  } catch (e) {
    state.errorMsg = "저장 중 네트워크 오류가 발생했어요: " + (e && e.message ? e.message : String(e)) + " (인터넷 연결을 확인하고 다시 시도해주세요.)";
  }
  state.submitting = false;
  render();
};

// ---------- 렌더 ----------
function render() {
  const app = document.getElementById("app");

  if (state.view === "thanks") {
    app.innerHTML = `
      <div class="card thanks">
        <div class="check">✓</div>
        <h2>설문에 응답해 주셔서 감사합니다!</h2>
        <p>제출이 정상적으로 완료되었습니다.<br/>프로젝트가 끝난 뒤 사후 설문에서 다시 만나요.</p>
      </div>`;
    return;
  }

  // ---- form view ----
  app.innerHTML = `
    <div class="hero">
      <span class="tag">사전 설문 · 프로젝트 시작 전</span>
      <h1>작품제작 프로젝트와 AI 활용에 관한<br/>사전 설문조사</h1>
      <p>정답이 있는 문항이 아니므로 평소 생각과 경험에 맞게 솔직하게 응답해 주세요.</p>
      <p>응답 내용은 연구 목적으로만 사용되며, 성적·평가에 전혀 반영되지 않습니다.</p>
      <p><b>소요 시간 약 5~7분 · 응답은 익명 처리됩니다.</b></p>
    </div>

    <div class="card">
      <div class="section-title">Ⅰ. 기본 정보</div>
      <div class="grid2">
        <div>
          <label class="field-label">학과</label>
          <input type="text" value="${state.dept}" oninput="updateField('dept', this.value)" placeholder="예: 자동차과" />
        </div>
        <div>
          <label class="field-label">학년/반</label>
          <input type="text" value="${state.grade}" oninput="updateField('grade', this.value)" placeholder="예: 2학년 3반" />
        </div>
      </div>
      <label class="field-label">성별</label>
      <div class="radio-row">
        <label><input type="radio" name="gender" ${state.gender==="남"?"checked":""} onchange="updateField('gender','남')" /> 남</label>
        <label><input type="radio" name="gender" ${state.gender==="여"?"checked":""} onchange="updateField('gender','여')" /> 여</label>
      </div>
      <label class="field-label" style="margin-top:10px;">설문 참여 코드 (생년월일 6자리) <span class="req">*</span></label>
      <input type="text" inputmode="numeric" maxlength="6" value="${state.code}" oninput="this.value = this.value.replace(/[^0-9]/g,'').slice(0,6); updateField('code', this.value)" placeholder="예: 990315 (생년월일 6자리, YYMMDD)" />
      <p style="font-size:12px;color:var(--sub);margin-top:6px;">※ 사전-사후 설문을 연결하기 위한 코드입니다. 이름은 적지 않습니다. 사후 설문 때도 본인의 생년월일 6자리를 동일하게 입력해주세요.</p>
    </div>

    ${likertBlock("Ⅱ. AI 활용 경험 및 익숙함", "다음은 여러분이 평소 생성형 AI(챗GPT, Claude, Gemini 등)를 사용해 온 경험에 관한 질문입니다.", experienceItems, "exp")}
    ${likertBlock("Ⅲ. 문제해결 자기효능감", "다음은 작품제작 과정에서 문제가 생겼을 때 스스로 해결할 수 있다는 자신감에 관한 질문입니다.", efficacyItems, "eff")}
    ${likertBlock("Ⅳ. AI에 대한 인식 및 태도", "다음은 생성형 AI에 대한 여러분의 생각에 관한 질문입니다.", attitudeItems, "att")}

    <div class="card">
      <div class="section-title">Ⅴ. 주관식 문항</div>
      <label class="field-label" style="margin-top:8px;">1. 이번 작품제작 프로젝트에서 AI를 활용한다면, 어떤 부분에 활용하고 싶은가요?</label>
      <textarea oninput="updateField('q1', this.value)">${state.q1}</textarea>
      <label class="field-label" style="margin-top:14px;">2. AI를 활용하는 데 있어 걱정되거나 조심스러운 부분이 있다면 적어주세요.</label>
      <textarea oninput="updateField('q2', this.value)">${state.q2}</textarea>
    </div>

    ${state.errorMsg ? `<p class="req" style="text-align:center;font-size:13px;">${state.errorMsg}</p>` : ""}

    <div class="submit-bar">
      <button class="submit" ${state.submitting ? "disabled" : ""} onclick="submitSurvey()">
        ${state.submitting ? "제출 중..." : "설문 제출하기"}
      </button>
    </div>

    <div class="footer-link">
      <span>응답 결과는 담당 선생님의 구글시트에서 확인할 수 있습니다.</span>
    </div>
  `;
}

render();
</script>

</body>
</html>
